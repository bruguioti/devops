apiVersion: apps/v1
kind: Deployment
metadata:
  name: minha-api-deployment
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: minha-api
  template:
    metadata:
      labels:
        app: minha-api
    spec:
      containers:
      - name: minha-api
        image: <SEU_AZURE_REGISTRY>.azurecr.io/minha-api-cloud:v1 # Será atualizado no pipeline
        ports:
        - containerPort: 8080